<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/cart.css">
</head>
<body>

<header class="header">
    <div class="container">
        <h1 class="logo">MyShop</h1>
        <nav class="nav">
                <ul>
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="products.html">Sản phẩm</a></li>
                    <li><a href="cart.html">Giỏ hàng</a></li>
                    <li><a href="product-detail.html">Chi tiết sản phẩm</a></li>
                    <li><a href="../admin/dashboard.html">Admin</a></li>
                </ul>
            </nav>
    </div>

</header>

<main class="container main-content">
    <h2>Giỏ hàng</h2>

    <table class="cart-table">
    <tr>
        <th>Sản phẩm</th>
        <th>Giá</th>
        <th>Số lượng</th>
        <th>Tổng</th>
        <th>Hành động</th>
    </tr>

    <tr>
        <td class="product-name">Sản phẩm 1</td>
        <td>100.000đ</td>
        <td>
            <input type="number" value="1" min="1">
        </td>
        <td>100.000đ</td>
        <td>
            <button class="btn-delete">Xoá</button>
        </td>
    </tr>

    <tr class="total-row">
        <td colspan="3"><b>Tổng tiền</b></td>
        <td colspan="2"><b>100.000đ</b></td>
    </tr>
</table>

<div class="cart-actions">
    <button class="btn-checkout">Thanh toán</button>
</div>
</main>

<footer class="footer">
    <div class="container">
        <p>© 2026 MyShop</p>
    </div>
</footer>

</body>
</html>
